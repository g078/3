<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TEAM DRIVE</title>
<style>
  body { background: #0a0a0a; color: white; font-family: Arial; margin: 0; }
  .login { height: 100vh; display: flex; justify-content: center; align-items: center; }
  .box { background: #111; padding: 40px; border-radius: 12px; text-align: center; }
  .box input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 6px; text-transform: uppercase; }
  .box button { width: 100%; padding: 12px; background: #ff0000; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
  
  #main { display: none; }
  .header { padding: 15px 20px; background: #111; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
  .upload-btn { background: #ff0000; padding: 10px 20px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; text-decoration: none; }
  iframe { width: 100%; height: calc(100vh - 65px); border: none; }
</style>
</head>
<body>

<!-- Screen 1: Password -->
<div class="login" id="login">
  <div class="box">
    <h1>TEAM ACCESS</h1>
    <input type="password" id="pass" placeholder="Enter Password">
    <button onclick="check()">ENTER</button>
    <p id="err" style="color:red; display:none;">Wrong Password</p>
  </div>
</div>

<!-- Screen 2: Drive with Custom Header -->
<div id="main">
  <div class="header">
    <h2>TEAM VIDEOS</h2>
    <!-- ये वाला बटन सीधा Drive के Upload पर ले जाएगा -->
    <a href="https://drive.google.com/drive/folders/1DwS7LJrKHoqb7NPhY05PW_PRkQdpib7I" target="_blank" class="upload-btn">+ ADD VIDEO</a>
  </div>
  
  <!-- Drive को List mode में embed किया। Google का बेकार UI हट गया -->
  <iframe src="https://drive.google.com/embeddedfolderview?id=1DwS7LJrKHoqb7NPhY05PW_PRkQdpib7I#list"></iframe>
</div>

<script>
function check() {
  if(document.getElementById("pass").value.toUpperCase() === "TEAM123") {
    document.getElementById("login").style.display = "none";
    document.getElementById("main").style.display = "block";
  } else {
    document.getElementById("err").style.display = "block";
  }
}
document.getElementById("pass").addEventListener("keypress", e => { if(e.key === "Enter") check() });
</script>

</body>
</html>
