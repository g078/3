<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Video Vault 🔒</title>
  <style>
    body { font-family: Arial; text-align: center; background: #0f0f0f; color: white; margin: 0; padding: 20px; }
    #lock, #content { margin-top: 80px; }
    input, button { padding: 12px 20px; font-size: 16px; border-radius: 8px; border: none; margin: 5px; }
    input { width: 250px; background: #222; color: white; }
    button { background: #ff0000; color: white; cursor: pointer; font-weight: bold; }
    button:hover { background: #cc0000; }
    #content { display: none; }
    iframe { width: 95%; height: 600px; border: 2px solid #333; border-radius: 10px; margin-top: 20px; }
    .upload-btn { background: #28a745; padding: 15px 30px; font-size: 18px; }
    .upload-btn:hover { background: #218838; }
  </style>
</head>
<body>

  <div id="lock">
    <h1>🔒 Private Video Vault</h1>
    <p>अंदर जाने के लिए password डालो</p>
    <input type="password" id="pwd" placeholder="Password डालें">
    <br>
    <button onclick="check()">Enter</button>
    <p id="msg" style="color:red; margin-top:10px;"></p>
  </div>

  <div id="content">
    <h1>📂 Our Collab Videos</h1>
    <p>नीचे बटन से वीडियो Upload करो। ऊपर सारे वीडियो दिख जाएंगे</p>
    
    <!-- YAHAN /u/0/ ADD KIYA HAI -->
    <a href="https://drive.google.com/drive/u/0/folders/1DwS7LJrKHoqb7NPhY05PW_PRkQdpib7I" target="_blank">
      <button class="upload-btn">+ Add New Video</button>
    </a>

    <p style="font-size:12px; color:#aaa;">Upload के बाद 10-20 सेकंड में यहां दिख जाएगा</p>

    <iframe src="https://drive.google.com/embeddedfolderview?id=1DwS7LJrKHoqb7NPhY05PW_PRkQdpib7I#grid"></iframe>
  </div>

<script>
const FIXED_PASSWORD = "team123"; // password यहां बदलो

function check(){
  if(document.getElementById('pwd').value === FIXED_PASSWORD){
    document.getElementById('lock').style.display='none';
    document.getElementById('content').style.display='block';
  } else {
    document.getElementById('msg').innerText = "गलत Password है भाई!";
  }
}
</script>

</body>
</html>
